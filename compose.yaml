services:
  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_DB: inilive_studio
      POSTGRES_USER: inilive
      POSTGRES_PASSWORD: inilive_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inilive -d inilive_studio"]
      interval: 5s
      timeout: 5s
      retries: 12

  broadcast-bridge:
    build:
      context: ./services/broadcast-bridge
    image: localhost/inilive-broadcast-bridge:bridge-003
    profiles:
      - bridge
    environment:
      BRIDGE_LISTEN_HOST: 0.0.0.0
      BRIDGE_CALLBACK_HMAC_SECRET: ${BRIDGE_CALLBACK_HMAC_SECRET:-dev-bridge-callback-hmac-secret}
    ports:
      - "8787:8787"
      - "8788:8788"
      - "8790-8810:8790-8810/udp"

volumes:
  postgres-data:
